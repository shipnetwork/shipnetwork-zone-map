<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USPS Zone Map Calculator</title>
    <link href="http://localhost:3000/index.css" rel="stylesheet" type="text/css"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        #usps-map {
            width: 100%;
            height: 100vh;
        }

        .map-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .zip-input-group {
            display: flex;
            flex-direction: row;
            gap: 10px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .zip-input-group > div {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 120px;
        }

        .zip-input-group label {
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }

        .zip-input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            width: 200px;
        }

        .zip-input:focus {
            outline: none;
            border-color: #8486FF;
        }

        .calculate-button {
            padding: 10px 20px;
            background-color: #8486FF;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .calculate-button:hover {
            background-color: #6668DD;
        }

        .calculate-button:active {
            background-color: #5557BB;
        }
    </style>
</head>
<body>
    <div id="usps-map"></div>
    <script defer src="http://localhost:3000/index.js"></script>
</body>
</html>
